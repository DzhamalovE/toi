<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Тойға шақыру</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h1>Құрметті қонақ!</h1>

    <p>Сізді тойымызға шақырамыз 💍</p>

    <h2>Айдос & Аружан</h2>

    <input type="text" id="name" placeholder="Атыңыз">
    <input type="text" id="phone" placeholder="Телефон">

    <select id="status">
        <option value="Иә">Келемін</option>
        <option value="Жоқ">Келе алмаймын</option>
    </select>

    <button onclick="sendData()">Жіберу</button>
    <h3>📍 Мекенжай:</h3>

<iframe 
    src="https://www.google.com/maps/embed?pb=https://maps.app.goo.gl/ozRcy1o54D8rSyFT7"
    width="100%" 
    height="250" 
    style="border:0; border-radius:15px;" 
    allowfullscreen="" 
    loading="lazy">
</iframe>

    <p id="result"></p>
</div>

<script src="script.js"></script>
</body>
</html>
